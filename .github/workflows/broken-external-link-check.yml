name: External Link Checker

on:
  schedule:
    - cron: '0 11 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check critical external links
        id: linkcheck
        run: |
          BROKEN=""
          OK=""

          check_link() {
            local url="$1"
            local label="$2"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --user-agent "Mozilla/5.0 TBI-LinkChecker/1.0" "$url" || echo "ERROR")
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
              OK="${OK}- ✅ ${label}: ${url} (${STATUS})\n"
            else
              BROKEN="${BROKEN}- ❌ ${label}: ${url} (${STATUS})\n"
            fi
          }

          check_link "https://twobirds-kramerica.github.io/clarity/" "Clarity"
          check_link "https://twobirds-kramerica.github.io/digital-confidence/" "Digital Confidence Centre"
          check_link "https://twobirds-kramerica.github.io/career-coach/" "Career Coach"
          check_link "https://twobirds-kramerica.github.io/kevins-apartment-search/" "Kevin's Apartment Search"
          check_link "https://twobirds-kramerica.github.io/aaron-patzalek/" "Aaron Patzalek (consulting profile)"

          echo "broken_links<<EOF" >> $GITHUB_OUTPUT
          printf "$BROKEN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "ok_links<<EOF" >> $GITHUB_OUTPUT
          printf "$OK" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          BROKEN_COUNT=$(printf "$BROKEN" | grep -c "❌" || echo "0")
          echo "broken_count=$BROKEN_COUNT" >> $GITHUB_OUTPUT

      - name: Create issue if broken links found
        if: steps.linkcheck.outputs.broken_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const brokenLinks = `${{ steps.linkcheck.outputs.broken_links }}`;
            const okLinks = `${{ steps.linkcheck.outputs.ok_links }}`;
            const brokenCount = '${{ steps.linkcheck.outputs.broken_count }}';

            const body = [
              `# 🔗 External Link Check — ${today}`,
              '',
              `## ⚠️ Broken or Unreachable Links (${brokenCount} found)`,
              brokenLinks,
              '',
              '## ✅ Links Working',
              okLinks,
              '',
              '## Priority',
              '- Clarity (primary conversion path)',
              '- Aaron Patzalek consulting profile',
              '',
              '---',
              '*Generated by GitHub Actions — External Link Checker (weekly, Sundays)*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔗 Broken Links Found — ${today}`,
              body: body,
              labels: ['broken-links', 'maintenance']
            });

      - name: Log results if all links ok
        if: steps.linkcheck.outputs.broken_count == '0'
        run: |
          echo "✅ All external links are working."
          echo "No issue created."

<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two Birds Innovation — AI Strategy for Small Business in Southwestern Ontario">
  <defs>
    <linearGradient id="bg-tbi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="70%" stop-color="#13102e"/>
      <stop offset="100%" stop-color="#1a1640"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-tbi)"/>

  <!-- Decorative grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Teal glow circles (decorative) -->
  <circle cx="1100" cy="120" r="220" fill="rgba(20,184,166,0.07)"/>
  <circle cx="1000" cy="530" r="140" fill="rgba(45,212,191,0.05)"/>

  <!-- Top teal accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#teal-grad)"/>

  <!-- Bird silhouette (two birds, simplified) - right side decoration -->
  <g transform="translate(1000, 160)" opacity="0.12">
    <!-- Bird 1 -->
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="white" transform="rotate(-15)"/>
    <ellipse cx="-28" cy="-18" rx="28" ry="10" fill="white" transform="rotate(-35)"/>
    <!-- Bird 2 (smaller, offset) -->
    <ellipse cx="80" cy="-45" rx="45" ry="16" fill="white" transform="rotate(-10)"/>
    <ellipse cx="56" cy="-58" rx="22" ry="8" fill="white" transform="rotate(-30)"/>
  </g>

  <!-- Company name -->
  <text x="80" y="188" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" fill="white" letter-spacing="-2">Two Birds Innovation</text>

  <!-- Teal underline accent -->
  <rect x="80" y="202" width="520" height="4" rx="2" fill="url(#teal-grad)"/>

  <!-- Primary tagline -->
  <text x="80" y="272" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="400" fill="rgba(255,255,255,0.85)">AI Strategy for Small Business</text>

  <!-- Supporting line -->
  <text x="80" y="322" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.55)">Helping Southwestern Ontario SMEs navigate the AI transition.</text>
  <text x="80" y="354" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.55)">Without the Toronto price tag.</text>

  <!-- Service cards -->
  <rect x="80" y="400" width="320" height="100" rx="10" fill="rgba(20,184,166,0.12)" stroke="rgba(20,184,166,0.3)" stroke-width="1"/>
  <text x="240" y="442" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#2dd4bf" text-anchor="middle">CA$2,500</text>
  <text x="240" y="475" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.65)" text-anchor="middle">AI Workflow Audit</text>

  <rect x="430" y="400" width="320" height="100" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="590" y="442" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle">CA$4,000/mo</text>
  <text x="590" y="475" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle">Fractional AI Leadership</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.4)"/>

  <!-- Location + URL -->
  <text x="80" y="600" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.45)">St. Thomas, Ontario  ·  twobirds-kramerica.github.io/two-birds-innovation</text>

  <!-- Book CTA -->
  <rect x="870" y="568" width="290" height="44" rx="6" fill="rgba(20,184,166,0.8)" stroke="rgba(45,212,191,0.5)" stroke-width="1"/>
  <text x="1015" y="595" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#0c0a1d" text-anchor="middle">Book a Free Call</text>
</svg>

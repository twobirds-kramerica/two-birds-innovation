<!DOCTYPE html>
<!--
  OG Card PNG Export Tool
  =======================
  HOW TO USE:
  1. Open this file in Chrome
  2. Press F12 → DevTools → Ctrl+Shift+P → type "screenshot"
  3. Choose "Capture full size screenshot"
  4. Save as og-card.png in this same folder
  5. Update index.html og:image from og-card.svg → og-card.png

  WHY: Twitter/X and some LinkedIn clients require PNG. The .svg
  version works on Slack, iMessage, Discord, WhatsApp, and most
  modern link preview renderers. PNG gives full platform coverage.
-->
<html lang="en-CA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Export Tool — Two Birds Innovation OG Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #0c0a1d; }
  </style>
</head>
<body>
  <img src="og-card.svg" width="1200" height="630" alt="OG Card Preview" style="display:block;">
</body>
</html>
